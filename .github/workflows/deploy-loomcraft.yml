name: deploy-loomcraft

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-loomcraft-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install --global pnpm@10.31.0

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm run build

      - name: Prepare release artifact
        run: |
          RELEASE_ARCHIVE="/tmp/release-${GITHUB_SHA}.tar.gz"

          tar --exclude=.git \
              --exclude=.github \
              --exclude=node_modules \
              --exclude=tests \
              --exclude=.env \
              -czf "${RELEASE_ARCHIVE}" .

          mv "${RELEASE_ARCHIVE}" release.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release
          path: release.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      APP_ROOT: ${{ secrets.LOOMCRAFT_APP_ROOT || '/var/www/loom-craft' }}
      RELEASE_SHA: ${{ github.sha }}

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v6
        with:
          name: release

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 30 -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload artifact to server
        run: |
          scp -P "${DEPLOY_PORT}" release.tar.gz "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/release-${RELEASE_SHA}.tar.gz"

      - name: Deploy release on server
        run: |
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "RELEASE_SHA='${RELEASE_SHA}' APP_ROOT='${APP_ROOT}' bash -s" <<'EOF'
          set -euo pipefail

          RELEASE_DIR="${APP_ROOT}/releases/${RELEASE_SHA}"
          SHARED_DIR="${APP_ROOT}/shared"
          CURRENT_LINK="${APP_ROOT}/current"
          WEB_GROUP="www-data"

          umask 0002

          if sudo -n true >/dev/null 2>&1; then
            sudo mkdir -p "${RELEASE_DIR}" "${SHARED_DIR}"
            sudo chown -R "${USER}:${WEB_GROUP}" "${APP_ROOT}"
          else
            mkdir -p "${RELEASE_DIR}" "${SHARED_DIR}"
          fi

          tar -xzf "/tmp/release-${RELEASE_SHA}.tar.gz" -C "${RELEASE_DIR}"

          ensure_node_runtime() {
            if command -v node >/dev/null 2>&1 && command -v npm >/dev/null 2>&1 && node -e 'process.exit(Number(process.versions.node.split(".")[0]) >= 22 ? 0 : 1)'; then
              return
            fi

            echo "Node.js 22+ and npm are required for Browsershot."
            echo "Install them manually on the VPS, then rerun this deployment:"
            echo "curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash -"
            echo "sudo apt-get install -y nodejs"
            exit 1
          }

          install_production_js_dependencies() {
            echo "Installing production JavaScript dependencies..."
            if command -v pnpm >/dev/null 2>&1; then
              PUPPETEER_SKIP_DOWNLOAD=1 pnpm install --frozen-lockfile --prod
              return
            fi

            PUPPETEER_SKIP_DOWNLOAD=1 npx --yes pnpm@10.31.0 install --frozen-lockfile --prod
          }

          ensure_browsershot_chrome() {
            echo "Ensuring Browsershot Chrome is installed..."
            BROWSERSHOT_CACHE_DIR="${SHARED_DIR}/storage/app/browsershot"
            mkdir -p "${BROWSERSHOT_CACHE_DIR}"

            CHROME_EXECUTABLE="$(find "${BROWSERSHOT_CACHE_DIR}/chrome" -type f -path "*/chrome-linux64/chrome" -perm -111 2>/dev/null | head -n 1 || true)"

            if [ -n "${CHROME_EXECUTABLE}" ]; then
              return
            fi

            find "${BROWSERSHOT_CACHE_DIR}/chrome" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | while read -r chrome_dir; do
              if [ ! -x "${chrome_dir}/chrome-linux64/chrome" ]; then
                rm -rf "${chrome_dir}"
              fi
            done

            if command -v pnpm >/dev/null 2>&1; then
              echo "Downloading Chrome into ${BROWSERSHOT_CACHE_DIR}/chrome..."
              PUPPETEER_CACHE_DIR="${BROWSERSHOT_CACHE_DIR}" pnpm dlx --reporter append-only --package puppeteer@24.43.1 puppeteer browsers install chrome
            else
              echo "Downloading Chrome with npx into ${BROWSERSHOT_CACHE_DIR}/chrome..."
              PUPPETEER_CACHE_DIR="${BROWSERSHOT_CACHE_DIR}" npx --yes puppeteer@24.43.1 browsers install chrome
            fi

            CHROME_EXECUTABLE="$(find "${BROWSERSHOT_CACHE_DIR}/chrome" -type f -path "*/chrome-linux64/chrome" -perm -111 2>/dev/null | head -n 1 || true)"
            if [ -z "${CHROME_EXECUTABLE}" ]; then
              echo "Chrome installation completed without a usable executable."
              find "${BROWSERSHOT_CACHE_DIR}" -maxdepth 4 -type f -print 2>/dev/null || true
              return 1
            fi
          }

          ensure_node_runtime

          ln -sfn "${SHARED_DIR}/.env" "${RELEASE_DIR}/.env"

          rm -rf "${RELEASE_DIR}/storage"
          ln -sfn "${SHARED_DIR}/storage" "${RELEASE_DIR}/storage"
          mkdir -p "${SHARED_DIR}/storage/app/public"
          mkdir -p "${SHARED_DIR}/storage/framework/cache"
          mkdir -p "${SHARED_DIR}/storage/framework/sessions"
          mkdir -p "${SHARED_DIR}/storage/framework/views"
          mkdir -p "${SHARED_DIR}/storage/logs"

          rm -rf "${RELEASE_DIR}/public/storage"
          ln -sfn "${RELEASE_DIR}/storage/app/public" "${RELEASE_DIR}/public/storage"

          mkdir -p "${RELEASE_DIR}/bootstrap/cache"
          rm -f "${RELEASE_DIR}/bootstrap/cache/"*.php

          # Ensure storage and cache are writable. We use sudo if available to handle files owned by the web server user.
          if sudo -n true >/dev/null 2>&1; then
            sudo touch "${SHARED_DIR}/storage/logs/laravel.log"
            sudo chown -R "${USER}:${WEB_GROUP}" "${SHARED_DIR}/storage" "${RELEASE_DIR}/bootstrap/cache"
            sudo find "${SHARED_DIR}/storage" "${RELEASE_DIR}/bootstrap/cache" -type d -exec chmod 2775 {} +
            sudo find "${SHARED_DIR}/storage" "${RELEASE_DIR}/bootstrap/cache" -type f -exec chmod 0664 {} +
          else
            # Fallback: try to chmod essential directories and ignore errors for files we don't own (like user uploads)
            chmod -R ug+rwX "${SHARED_DIR}/storage/logs" "${SHARED_DIR}/storage/framework" "${RELEASE_DIR}/bootstrap/cache" 2>/dev/null || true
            find "${SHARED_DIR}/storage/logs" "${SHARED_DIR}/storage/framework" "${RELEASE_DIR}/bootstrap/cache" -type d -exec chmod g+s {} + 2>/dev/null || true
            touch "${SHARED_DIR}/storage/logs/laravel.log" 2>/dev/null || true
          fi

          cd "${RELEASE_DIR}"
          install_production_js_dependencies
          ensure_browsershot_chrome
          LOG_CHANNEL=stderr php artisan migrate --force
          LOG_CHANNEL=stderr php artisan optimize:clear
          LOG_CHANNEL=stderr php artisan optimize

          ln -sfn "${RELEASE_DIR}" "${CURRENT_LINK}"
          LOG_CHANNEL=stderr php "${CURRENT_LINK}/artisan" queue:restart

          if sudo -n true >/dev/null 2>&1; then
            sudo systemctl reload php8.4-fpm
            sudo systemctl reload nginx
          else
            echo "Skipping service reloads: passwordless sudo is not configured for ${USER}."
          fi

          rm -f "/tmp/release-${RELEASE_SHA}.tar.gz"
          EOF
